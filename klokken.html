
<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <title>Scorebord</title>
    <style>
        body {
            margin: 0;
            background-color: black;
            font-family: Arial, sans-serif;
        }

        .grid-container {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            grid-template-rows: 1fr 1fr 1fr 1fr 1fr 1fr;
            height: 100vh;
            border: 4px solid lightgray;
        }

        .cell,
        .nested-cell {
            border: 4px solid lightgray;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: lightgray;
            /* All text grey by default */
        }

        .label {
            font-size: 3vw;
        }

        .value {
            font-size: 6vw;
            /* Larger numbers */
            margin-top: 1vh;
        }

        .tijd {
            grid-column: 2 / 4;
            grid-row: 1 / 3;
        }

        .wedstrijd-container {
            grid-column: 2 / 4;
            grid-row: 3 / 5;
            display: grid;
            grid-template-rows: 1fr;
        }

        .schotklok-container {
            grid-column: 2 / 3;
            grid-row: 5 / 7;
            display: grid;
            grid-template-rows: 1fr;
        }

        .wedstrijd,
        .schotklok {
            border: 4px solid lightgray;
        }

        .start-productie {
            grid-column: 1 / 2;
            grid-row: 1 / 7;
        }

        .score-container {
            grid-column: 3 / 4;
            grid-row: 5 / 7;
            display: grid;
        }

        .score {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .score-values {
            display: flex;
            gap: 4vw;
            margin-top: 1vh;
        }
    </style>
</head>

<body id="body">
    <div class="grid-container">
        <div class="cell tijd">
            <div class="label">Tijd</div>
            <div id="time" class="value">88:88:88</div>
        </div>

        <div class="cell start-productie">
        <!-- Add the URL to getonline below-->
            <iframe src="https://cloud.getontime.no/bpcugong/studio?main=custom-On_Stage" width="100%" height="100%"></iframe>
        </div>

        <div class="wedstrijd-container">
            <div class="cell nested-cell wedstrijd">
                <div id="match-time-label" class="label">Wedstrijd</div>
                <div id="match-time" class="value">88:88</div>
            </div>
        </div>

        <div class="schotklok-container">
            <div class="cell nested-cell schotklok">
                <div class="label">Schotklok</div>
                <div id="shotclock-time" class="value">25</div>
            </div>
        </div>

        <div class="score-container">
            <div class="cell score">
                <div class="label">Score</div>
                <div class="score-values">
                    <div id="home-score" class="value">88</div>
                    <div class="value">-</div>
                    <div id="guest-score" class="value">88</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        /* Get the element you want displayed in fullscreen mode (a video in this example): */
        var elem = document.getElementById("body");

        /* When the openFullscreen() function is executed, open the video in fullscreen.
        Note that we must include prefixes for different browsers, as they don't support the requestFullscreen method yet */
        function openFullscreen() {
            if (elem.requestFullscreen) {
                elem.requestFullscreen();
            } else if (elem.webkitRequestFullscreen) { /* Safari */
                elem.webkitRequestFullscreen();
            } else if (elem.msRequestFullscreen) { /* IE11 */
                elem.msRequestFullscreen();
            }
            elem.requestFullscreen();
        }

        openFullscreen()

    </script>
    <script>

        // ── Configuration ────────────────────────────────────────────────────
        var scoreboard_address  = "10.12.0.62"
        var shotclock_address   = "10.12.0.61"
        var proxy_base          = "http://10.12.0.182:8080/proxy?url="
        var timer_status_url    = "http://10.12.0.182:8080/timer/status"
        var interval            = 100 // ms
        // ─────────────────────────────────────────────────────────────────────

        var time_address      = proxy_base + encodeURIComponent("http://" + scoreboard_address + "/time")
        var score_address     = proxy_base + encodeURIComponent("http://" + scoreboard_address + "/score")
        var shotclock_address = proxy_base + encodeURIComponent("http://" + shotclock_address + "")
        var shotclock_address = proxy_base + "http://" + shotclock_address

        var currentTimerMode = "game"  // kept in sync by parseTimerStatus

        var score_interval = window.setInterval(() => {
            getDataScoreBoard(score_address)
            getDataTimeclock(time_address)
            getDataShotclock(shotclock_address)
            updateTime()
            getTimerStatus()  // must be last: overwrites #match-time when mode=countdown
        }, interval);


        function getDataScoreBoard(url) {
            fetch(url)
                .then(response => response.json())
                .then(json => parseJsonScoreboard(json))
        }

        function getDataTimeclock(url) {
            fetch(url)
                .then(response => response.json())
                .then(json => parseJsonScoreboard(json[0]))
        }

        function getDataShotclock(url) {
            fetch(url)
                .then(response => response.json())
                .then(json => parseJsonShotclock(json[0]))
        }

        function applyMatchTimeStyle(totalSeconds) {
            const matchTimeEl = document.getElementById("match-time");
            const cell = matchTimeEl.closest('.wedstrijd');
            if (totalSeconds < 60) {
                cell.style.backgroundColor = 'red';
                matchTimeEl.style.color = 'white';
            } else if (totalSeconds < 300) {
                cell.style.backgroundColor = '';
                matchTimeEl.style.color = 'red';
            } else {
                cell.style.backgroundColor = '';
                matchTimeEl.style.color = '';
            }
        }

        function parseJsonScoreboard(json) {
            console.log(json)

            // if (json.status != "OK") {
            //     console.error("invalid data", json)
            //     return
            // }

            if (currentTimerMode === "game" && (json.formatted != undefined)) {
                const matchTimeEl = document.getElementById("match-time");
                matchTimeEl.innerHTML = String(json.formatted);
                const parts = matchTimeEl.innerHTML.split(':');
                const totalSeconds = parseInt(parts[0], 10) * 60 + parseInt(parts[1], 10);
                applyMatchTimeStyle(totalSeconds);
            }

            if (json.home != undefined) {
                document.getElementById("home-score").innerHTML = String(json.home)
            }

            if (json.guest != undefined) {
                document.getElementById("guest-score").innerHTML = String(json.guest)
            }
        }

        function getTimerStatus() {
            fetch(timer_status_url)
                .then(r => r.json())
                .then(json => parseTimerStatus(json))
                .catch(err => console.warn("timer status failed", err))
        }

        function parseTimerStatus(json) {
            currentTimerMode = json.mode;
            document.getElementById("match-time-label").textContent =
                json.mode === "countdown" ? (json.label || "Timer") : "Wedstrijd";
            if (json.mode !== "countdown") return;
            const matchTimeEl = document.getElementById("match-time");
            const remaining = json.remaining_seconds;
            if (remaining === null || remaining === undefined) {
                matchTimeEl.innerHTML = "--:--";
                return;
            }
            const total = Math.max(0, Math.floor(remaining));
            const m = Math.floor(total / 60);
            const s = total % 60;
            matchTimeEl.innerHTML = String(m) + ":" + String(s).padStart(2, "0");
            applyMatchTimeStyle(total);
        }

        function parseJsonShotclock(json) {
            console.log(json)

            // if (json.status != "OK") {
            //     console.error("invalid data", json)
            //     return
            // }

            if (json.time != undefined) {
                document.getElementById("shotclock-time").innerHTML =
                    String(json.time)
            }
        }

        function updateTime() {
            const now = new Date();
            const hh = String(now.getHours()).padStart(2, '0');
            const mm = String(now.getMinutes()).padStart(2, '0');
            const ss = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('time').textContent = `${hh}:${mm}:${ss}`;
        }

    </script>
</body>

</html>
